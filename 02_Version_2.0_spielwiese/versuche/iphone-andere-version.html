<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jürgen Mann - OS Installation v2.0.2026</title>
    <style>
        :root {
            --apple-red: #FF3B30;
            --apple-green: #32D74B;
            --apple-gray: #A1A1A6;
            --bg-dark: #000000;
            --terminal-bg: #1c1c1e;
        }

        body {
            background-color: var(--bg-dark);
            color: #F5F5F7;
            font-family: -apple-system, "SF Mono", "Menlo", monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Der Terminal-Container */
        #monitor {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
        }

        #boot-log {
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .error-line { color: var(--apple-red); font-weight: bold; }
        .info-line { color: var(--apple-gray); }

        /* Der macOS-Flash Effekt (Easter Egg Glitch) */
        #mac-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #mac-flash img { width: 150px; opacity: 0.8; }

        /* DFU Mode Screen */
        #dfu-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Fortschrittsbalken wie im Screenshot */
        .progress-container {
            width: 300px;
            height: 4px;
            background: #38383A;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--apple-green);
            box-shadow: 0 0 10px var(--apple-green);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <!-- Haupt-Terminal für Boot & Linux Easter Egg -->
    <div id="monitor">
        <div id="boot-log"></div>
    </div>

    <!-- macOS Flash Overlay (Kurzzeitig sichtbar bei Crash) -->
    <div id="mac-flash">
        <div style="color:black; font-weight:bold; font-size:24px;">macOS Recovery Service</div>
    </div>

    <!-- DFU Recovery Mode -->
    <div id="dfu-screen">
        <p style="font-size:18px;">Device Firmware Update (DFU)</p>
        <p class="info-line" id="dfu-status">Restoring from system_arch.ipsw...</p>
        <div class="progress-container">
            <div id="bar" class="progress-bar"></div>
        </div>
    </div>

    <script>
        const bootData = [
            { text: "[    0.000000] Linux version 6.1.0-25-generic", delay: 80 },
            { text: "[    0.000001] Command line: BOOT_IMAGE=/vmlinuz root=UUID=xxx ro quiet splash", delay: 60 },
            { text: "[    0.001234] e820: BIOS-provided physical RAM map", delay: 50 },
            { text: "[    0.012345] Zone ranges:", delay: 40 },
            { text: "[    0.023456] Initramfs unpacking: Done", delay: 50 },
            { text: "[    0.045678] PCI: CLS 64 bytes, default 64", delay: 40 },
            { text: "[    0.123456] iommu: Default domain type: Translated", delay: 50 },
            { text: "[    0.234567] systemd[1]: systemd 252.5 running in system mode", delay: 60 },
            { text: "[    0.267890] Detecting iOS Boot-Chain...", delay: 80 },
            { text: "Signature mismatch in Kernel-Image", delay: 300 },
            { text: "Attempting to bypass NAND-Write-Protection...", delay: 150 },
            { text: "Injecting kaffeemaschine.ipa into Boot-Layer...", delay: 400 },
            { text: "CRITICAL: KERNEL PANIC - Memory Corruption at 0xCAFFEE", delay: 10, error: true }
        ];

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function startSequence() {
            const log = document.getElementById('boot-log');

            // 1. Linux Boot (13 Zeilen Easter Egg)
            for (let i = 0; i < bootData.length; i++) {
                const line = bootData[i];
                const div = document.createElement('div');
                div.textContent = line.text;
                if (line.error) div.className = "error-line";
                log.appendChild(div);
                await sleep(line.delay);

                // Absturz bei Zeile 13
                if (i === 12) {
                    await sleep(400);
                    await triggerMacGlitch();
                }
            }
        }

        async function triggerMacGlitch() {
            // macOS Flash Effekt (0.3s)
            document.getElementById('monitor').style.display = 'none';
            const flash = document.getElementById('mac-flash');
            flash.style.display = 'flex';
            await sleep(300);
            flash.style.display = 'none';

            // In den DFU Mode wechseln
            startDFU();
        }

        async function startDFU() {
            const dfu = document.getElementById('dfu-screen');
            const bar = document.getElementById('bar');
            const status = document.getElementById('dfu-status');
            dfu.style.display = 'flex';

            // Simulation der Wiederherstellung (Android Pakete auf iPhone)
            let progress = 0;
            const steps = [
                "Extracting system_architecture.ipsw...",
                "Overriding Security-Policy for kaffeemaschine.ipa...",
                "Force-Injecting Coffee-Modules...",
                "Finalizing Deep-Work-OS..."
            ];

            const interval = setInterval(() => {
                progress += 1;
                bar.style.width = progress + "%";

                if (progress % 25 === 0) {
                    status.textContent = steps[Math.min(3, Math.floor(progress / 25))];
                }

                if (progress >= 100) {
                    clearInterval(interval);
                    status.innerHTML = "<span style='color:#32D74B'>Installation Successful. Rebooting...</span>";
                    // Hier würde dein App-Design aus dem Screenshot laden
                }
            }, 50); // Schneller Fortschritt für dein 5-7s Fenster
        }

        window.onload = startSequence;
    </script>
</body>
</html>
