<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jürgen Mann - Multi-OS Terminal Simulation</title>
    <style>
        /* Gemeinsames Basis-Styling */
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        /* Das Terminal-Fenster – Röhren-Monitor-Look */
        #terminal-window {
            width: 800px;
            max-width: 95vw;
            height: 450px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 25px / 15px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.8);
            animation: monitor-flicker 0.15s infinite;
            transition: background-color 0.2s, color 0.2s, border 0.2s;
        }
        #terminal-window > #output {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            z-index: 1;
            padding: 4px 0;
            box-sizing: border-box;
        }

        /* Scanlines (horizontale Linien) */
        #terminal-window::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Wandernder heller Streifen (Static Noise) */
        #terminal-window::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.03);
            opacity: 0;
            z-index: 11;
            pointer-events: none;
            animation: scanline-move 8s linear infinite;
        }

        @keyframes monitor-flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        @keyframes scanline-move {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Leichter Text-Glow für Linux & Mac */
        .term-linux #output,
        .term-mac #output {
            animation: text-glow 2s ease-in-out infinite alternate;
        }

        @keyframes text-glow {
            from { text-shadow: 0 0 5px currentColor; }
            to { text-shadow: 0 0 12px currentColor; }
        }

        /* --- THEMEN-STYLING --- */

        /* Windows 95/98 */
        .term-win {
            background-color: #000;
            color: #C0C0C0;
            font-family: 'Lucida Console', 'Courier New', monospace;
            border: 3px outset #808080;
        }

        /* Linux Retro */
        .term-linux {
            background-color: #050505;
            color: #00FF41;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
            border: 1px solid #333;
        }

        /* macOS Classic */
        .term-mac {
            background-color: #000;
            color: #F5F5F7;
            font-family: 'Monaco', 'Menlo', 'SF Mono', monospace;
            -webkit-font-smoothing: antialiased;
            border: 1px solid #444;
            letter-spacing: -0.3px;
        }

        .line { margin-bottom: 4px; line-height: 1.4; white-space: pre-wrap; }
        .prompt { font-weight: bold; margin-top: 10px; }

        /* Krümmung: Vignette (Dunklere Ränder wie bei Röhre) */
        .screen-curve {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(
                ellipse 80% 80% at 50% 50%,
                transparent 50%,
                rgba(0, 0, 0, 0.15) 75%,
                rgba(0, 0, 0, 0.4) 100%
            );
        }

        /* Rauschen (Filmkorn) */
        .noise-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: 9;
            opacity: 0.06;
            filter: url(#noiseFilter);
        }

        /* Power-ON: Beim ersten Öffnen – Röhre an (Kurz blitzen, dann aus Schwarz hochfahren) */
        #power-on-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: 100;
            animation: power-on 2.2s ease-out forwards;
        }

        @keyframes power-on {
            0% {
                background: #fff;
                opacity: 0.9;
            }
            6% {
                background: #000;
                opacity: 1;
            }
            100% {
                background: #000;
                opacity: 0;
                pointer-events: none;
            }
        }
    </style>
</head>
<body>

    <!-- SVG-Filter für Rauschen (feTurbulence) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;visibility:hidden">
        <filter id="noiseFilter" x="0" y="0">
            <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" result="n"/>
            <feColorMatrix in="n" type="saturate" values="0"/>
        </filter>
    </svg>

    <div class="controls">
        <button style="background:#808080; color:white;" onclick="startBoot('win')">Windows 95</button>
        <button style="background:#00FF41; color:black;" onclick="startBoot('linux')">Linux (Debian)</button>
        <button style="background:#F5F5F7; color:black;" onclick="startBoot('mac')">macOS (Darwin)</button>
    </div>

    <div id="terminal-window" class="term-win">
        <div id="power-on-overlay"></div>
        <div id="output"></div>
        <div class="screen-curve" aria-hidden="true"></div>
        <div class="noise-overlay" style="background:#000" aria-hidden="true"></div>
    </div>

    <script>
        const scripts = {
            win: {
                class: 'term-win',
                data: [
                    { text: "C:\\WINDOWS> cls", delay: 1000 },
                    { text: "Installation von kaffeemaschine.exe beginnt...", delay: 500 }
                ]
            },
            linux: {
                class: 'term-linux',
                data: [
                    { text: "Access granted to kernel-layer.", delay: 300 },
                    { text: "user@debian:~$ clear", delay: 1000 },
                    { text: "Reading package lists... Done. Installing coffee-mod...", delay: 200 }
                ]
            },
            mac: {
                class: 'term-mac',
                data: [
                    { text: "[KEXT] com.apple.iokit.IOStorageFamily loaded", delay: 50 },
                    { text: "Waiting for Root Device... Got boot device", delay: 300 },
                    { text: "Graphics Start: AppleDisplay initialized", delay: 100 },
                    { text: "MacBook-Pro:~ user$ echo \"Booting into Deep Work...\"", delay: 800 },
                    { text: "==> Deep Work Mode activated via AppleScript", delay: 400 },
                    { text: "MacBook-Pro:~ user$ clear", delay: 1000 },
                    { text: "==> Extracting kaffeemaschine.ipa (v2.0.2026)...", delay: 300 }
                ]
            }
        };

        let isRunning = false;

        async function startBoot(os) {
            if (isRunning) return;
            isRunning = true;

            const win = document.getElementById('terminal-window');
            const output = document.getElementById('output');

            // Theme wechseln & Bildschirm leeren
            win.className = scripts[os].class;
            output.innerHTML = '';

            for (const line of scripts[os].data) {
                // cls / clear: erst warten, dann Ausgabe leeren (Zeile nicht anzeigen)
                if (line.text.includes('cls') || line.text.includes('clear')) {
                    await new Promise(res => setTimeout(res, line.delay));
                    output.innerHTML = '';
                    continue;
                }

                const div = document.createElement('div');
                div.className = 'line';
                div.textContent = line.text;
                output.appendChild(div);

                output.scrollTop = output.scrollHeight;
                await new Promise(res => setTimeout(res, line.delay));
            }

            isRunning = false;
        }
    </script>
</body>
</html>
