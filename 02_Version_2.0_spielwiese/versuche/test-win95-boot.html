<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows 95 Boot – Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #C0C0C0;
      font-family: "Monaco", "Courier New", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.35;
      min-height: 100vh;
      overflow: hidden;
    }
    #boot-screen {
      position: fixed;
      inset: 0;
      z-index: 1;
      padding: 16px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #boot-output {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #boot-output::-webkit-scrollbar { width: 8px; }
    #boot-output::-webkit-scrollbar-track { background: #0a0a0a; }
    #boot-output::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
    /* Scanlines (CRT-Effekt) */
    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      opacity: 0.6;
    }
    .restart-hint {
      position: fixed;
      bottom: 12px;
      right: 12px;
      font-size: 11px;
      color: #606060;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div id="boot-screen">
    <div id="boot-output"></div>
  </div>
  <div id="scanlines" aria-hidden="true"></div>
  <div class="restart-hint">Seite neu laden = Boot wiederholen</div>

  <script src="../story/content/boot-data.js"></script>
  <script>
    (function() {
      var data = window.BOOT_DATA;
      if (!data || !data.winBootSequence) {
        document.getElementById("boot-output").textContent = "Fehler: boot-data.js nicht geladen oder winBootSequence fehlt.";
        return;
      }

      var hints = data.winBootHints || {};
      if (hints.color) document.body.style.color = hints.color;
      if (hints.font && hints.font !== "Perfect DOS VGA 437") {
        document.body.style.fontFamily = hints.font + ", " + (hints.fontFallback || "monospace");
      }

      var container = document.getElementById("boot-output");
      var seq = data.winBootSequence;

      async function runBoot() {
        for (var i = 0; i < seq.length; i++) {
          var line = seq[i];
          var div = document.createElement("div");
          div.textContent = line.text;
          container.appendChild(div);
          container.parentElement.scrollTop = container.parentElement.scrollHeight;
          await new Promise(function(r) { setTimeout(r, line.delay); });
        }
      }

      runBoot();
    })();
  </script>
</body>
</html>
