<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jürgen Mann – Windows</title>
  <!-- Win V2: Boot (Win95) → MS-DOS-Eingabeaufforderung → Story (C: versuchen → jm lebenslauf.html → Prüfung) → Flow → Deckblatt. Struktur wie Mac/Linux. -->
  <link rel="stylesheet" href="win-view.css">
</head>
<body>

  <div class="win-desktop">
    <div class="win-main">
      <!-- Boot: Win95-Sequenz (BOOT_DATA.winBootSequence) -->
      <div class="shell">
        <div id="monitor" class="win-monitor">
          <div id="boot-container"></div>
        </div>
        <!-- Konsole: MS-DOS-Eingabeaufforderung (WIN_TERMINAL_DATA) -->
        <div id="cmd-stage" class="hidden">
          <div id="cmd-window" class="win95-window">
            <div class="win95-titlebar">
              <span class="win95-titlebar-icon" title="MS-DOS">C:&gt;</span>
              <span id="cmd-title">MS-DOS-Eingabeaufforderung</span>
              <div class="win95-title-buttons">
                <div class="win95-btn">_</div>
                <div class="win95-btn">&#9634;</div>
                <div class="win95-btn">X</div>
              </div>
            </div>
            <div class="win95-toolbar">
              <span class="win95-label">Schriftgröße:</span>
              <span class="win95-select-wrap"><span class="win95-dropdown-arrow">&#9660;</span><select class="win95-select"><option>Auto</option><option>8 x 12</option><option>10 x 18</option></select></span>
              <button class="win95-button" type="button">Vollbild</button>
              <button class="win95-button" type="button">Fenster</button>
            </div>
            <div class="win95-client">
            <div class="win95-output-wrap">
              <div id="console-output" class="win95-content"></div>
              <span class="win95-cursor" id="win-cursor">_</span>
            </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../story/content/boot-data.js"></script>
  <script src="content/win_terminal_data.js"></script>
  <script src="content/win_story_script-data.js"></script>
  <script src="win-view.js"></script>
</body>
</html>
