async function run() {
  var screen = document.getElementById("boot-loading-screen");
  var output = document.getElementById("boot-loading-output");
  if (!screen || !output) return;
  var lines = [];
  var delay = 2;
  for (var i = 0; i < BOOT_LINES.length; i++) {
    lines.push(BOOT_LINES[i]);
    output.textContent = lines.join("\n");
    output.scrollTop = output.scrollHeight;
    await new Promise(function(r) { setTimeout(r, delay); });
  }
  lines.push("");
  var ua = navigator.userAgent || "";
  var origin = window.location.origin;
  var osLabel = "Unbekannt";
  var next = origin + "/4_lebenslauf/";
  if (ua.indexOf("Win") !== -1) {
    osLabel = "Windows";
    next = origin + "/2.1_win/";
  } else if (ua.indexOf("Android") !== -1) {
    osLabel = "Android";
    next = origin + "/2.4_android/";
  } else if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) {
    osLabel = "iOS";
    next = origin + "/2.5_iphone/";
  } else if (ua.indexOf("Mac") !== -1) {
    osLabel = "macOS";
    next = origin + "/2_mac/";
  } else if (ua.indexOf("Linux") !== -1) {
    osLabel = "Linux";
    next = origin + "/2.3_linux/";
  }
  if (osLabel === "iOS") {
    lines.push("iPhone erkannt");
    output.textContent = lines.join("\n");
    output.scrollTop = output.scrollHeight;
    await new Promise(function(r) { setTimeout(r, 500); });
    lines.push("Systemfehler: Bootsektoren nicht gefunden");
    output.textContent = lines.join("\n");
    output.scrollTop = output.scrollHeight;
    await new Promise(function(r) { setTimeout(r, 700); });
    lines.push("DFU wird gestartet");
    output.textContent = lines.join("\n");
    output.scrollTop = output.scrollHeight;
    await new Promise(function(r) { setTimeout(r, 1200); });
  } else {
    lines.push("System wird analysiert – " + osLabel + " erkannt");
    lines.push("Bootvorgang abgeschlossen.");
    output.textContent = lines.join("\n");
    output.scrollTop = output.scrollHeight;
    await new Promise(function(r) { setTimeout(r, 1200); });
  }
  screen.style.transition = "opacity 0.4s ease";
  screen.style.opacity = "0";
  await new Promise(function(r) { setTimeout(r, 450); });
  window.location.replace(next);
}
run();
